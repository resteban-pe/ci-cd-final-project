# Nombre del flujo de trabajo
name: CI Workflow

# PASO 1: 1. Eventos que activan el flujo (Triggers)
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
    
# PASO 1: 2. Definición de los trabajos (Jobs)
jobs:
  build:
    # PASO 1: 3. El Ejecutor (Runner): Una máquina virtual con Ubuntu
    runs-on: ubuntu-latest
    
    # PASO 1: 4. El Contenedor: Ejecutar los pasos dentro de una imagen de Python
    container:
      image: python:3.9-slim

    # PASO 2: Añadimos el servicio de Redis
    services:
      redis:
        image: redis:6-alpine
        ports:
          - 6379:6379

    steps:
      # Descarga el código del repositorio
      - name: Checkout code
        uses: actions/checkout@v4

      # Instala las librerías necesarias
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 nose redis  # Instalamos las herramientas explícitamente

      # PASO DE LINTING (Obligatorio para el Proyecto Final)
      - name: Run Linting with flake8
        run: |
          # Detiene la ejecución si hay errores de sintaxis o Python
          # --count: cuenta errores, --select=E9,F63,F7,F82: errores críticos
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Advertencias de estilo (opcional pero profesional)
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      # PASO 2 Ejecutar las pruebas unitarias
      # Usamos una variable de entorno para decirle a Python dónde está Redis
      - name: Run unit tests with nosetests
        env:
          # El host 'redis' es el nombre del servicio definido arriba
          DATABASE_URI: redis://redis:6379
        run: nosetests
